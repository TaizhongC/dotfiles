$font = Noto Sans
$wallpaper = /home/tc/Pictures/Wallpapers/wallhaven-213wg9.jpg

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 1
    brightness = 0.88
    contrast = 1.00
}

input-field {
    monitor =
    size = 26%, 5.5%
    outline_thickness = 4
    inner_color = rgba(dee3e6cc)
    outer_color = rgba(88d1ecff)
    check_color = rgba(88d1ecee)
    fail_color = rgba(ec6a88ee)

    font_color = rgb(de,e3,e6)
    fade_on_empty = false
    rounding = 20

    font_family = $font
    placeholder_text = Unlock
    fail_text = $PAMFAIL

    dots_spacing = 0.3
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 56
    font_family = $font
    color = rgb(de,e3,e6)
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 18
    font_family = $font
    color = rgb(b3,ca,d4)
    position = 0, 214
    halign = center
    valign = center
}
