# Kitty terminal colors and spacing.
#
# This restores distinct ANSI colors so shells and CLI tools can format text
# normally, while keeping the palette aligned with the existing dark desktop
# theme.

# Generate the rest of Kitty's 256-color palette from the theme colors so apps
# that use extended colors do not collapse back to the built-in dull defaults.
palette_generate semantic

background       #0f1416
foreground       #dee3e6
selection_background #40484c
selection_foreground #dee3e6
cursor           #88d1ec
cursor_text_color #001f28

color0  #0f1416
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #dee3e6
color8  #40484c
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #f5f7fa

tab_bar_style powerline
active_tab_background   #f38ba8
active_tab_foreground    #0f1416
active_tab_font_style    bold
inactive_tab_background  #243135
inactive_tab_foreground  #dee3e6
inactive_tab_font_style   normal
tab_bar_background       #0f1416

window_padding_width 10
